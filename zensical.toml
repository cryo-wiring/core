[project]
site_name = "cryo-wiring-core"
site_description = "Python library for dilution refrigerator wiring configuration"
site_url = "https://cryo-wiring.github.io/core/"
nav = [
  {"Home" = "index.md"},
  {"Getting Started" = "getting-started.md"},
  {"Guide" = [
    "guide/builder.md",
    "guide/summary.md",
    "guide/diagram.md",
  ]},
  {"API Reference" = [
    "reference/models.md",
    "reference/builder.md",
    "reference/summary.md",
    "reference/diagram.md",
    "reference/loader.md",
    "reference/validate.md",
  ]},
  {"Playground" = "playground.md"},
]
extra_css = ["stylesheets/extra.css"]

[project.theme]
favicon = "assets/logo.png"
logo = "assets/logo.png"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[[project.theme.palette]]
scheme = "slate"
primary = "light-blue"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "light-blue"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"
