name: Deploy docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v5

      - name: Build docs
        run: |
          uv sync --group docs
          uv run zensical build

      - name: Build JupyterLite playground
        run: |
          uv sync --group playground
          uv build --wheel --out-dir examples/pypi/
          uv run jupyter lite build --lite-dir examples --contents examples/notebooks --output-dir site/playground/lite

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
